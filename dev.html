<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#bfeaff" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>جزيرة المقالب — Prank Island</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #2a3b2f;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none; overscroll-behavior: none;
    }
    /* Phaser (Scale.FIT + CENTER_BOTH) handles sizing inside this box.
       position:fixed/inset:0 avoids the mobile 100vh address-bar bug. */
    #game { position: fixed; inset: 0; }
    #game canvas { display: block; }

    /* Ask portrait phones to rotate — the game is landscape. */
    #rotate {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #2a3b2f; color: #fff7ec;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 24px; gap: 14px;
    }
    #rotate .icon { font-size: 64px; animation: spin 2.2s ease-in-out infinite; }
    #rotate h1 { font-size: 22px; }
    #rotate p { font-size: 16px; opacity: .85; }
    @keyframes spin { 0%,40%{transform:rotate(0)} 60%,100%{transform:rotate(90deg)} }
    @media (orientation: portrait) and (pointer: coarse) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate">
    <div class="icon">📱🔄</div>
    <h1>أدِر جهازك أفقياً</h1>
    <p>اللعبة تُلعب بشكل أفضل في الوضع الأفقي 🎮</p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
