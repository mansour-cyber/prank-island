<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#bfeaff" />
  <title>جزيرة المقالب — Prank Island</title>
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #2a3b2f;
      font-family: "Tahoma", "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    #game { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    #game canvas { border-radius: 10px; box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
