<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#9fd6f4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>جزيرة الأبطال — العالم المفتوح</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #9fd6f4;
      font-family: "Tahoma", "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent;
      touch-action: none; overscroll-behavior: none; user-select: none; color: #3a2c28; }
    #app { position: fixed; inset: 0; } #app canvas { display: block; }

    .pill { position: fixed; z-index: 20; background: rgba(0,0,0,.3); color: #fff; font-weight: bold;
      padding: 8px 14px; border-radius: 14px; text-shadow: 0 2px 4px rgba(0,0,0,.3); font-size: 18px; }
    #coins { top: 12px; left: 14px; }
    .back2d { position: fixed; top: 12px; right: 14px; z-index: 22; text-decoration: none; color: #fff; font-weight: bold;
      background: rgba(0,0,0,.3); padding: 9px 13px; border-radius: 13px; font-size: 14px; }
    #toast { position: fixed; top: 54px; left: 50%; transform: translateX(-50%); z-index: 20; color: #fff; font-weight: bold;
      background: rgba(0,0,0,.45); padding: 9px 16px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none;
      max-width: 90vw; text-align: center; font-size: 15px; }
    #toast.show { opacity: 1; }

    /* controls */
    #joy { position: fixed; z-index: 25; left: 24px; bottom: 24px; width: 128px; height: 128px; border-radius: 50%;
      background: rgba(255,255,255,.18); border: 3px solid rgba(255,255,255,.45); touch-action: none; }
    #knob { position: absolute; left: 50%; top: 50%; width: 56px; height: 56px; margin: -28px 0 0 -28px; border-radius: 50%;
      background: rgba(255,255,255,.85); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    #jumpBtn { position: fixed; z-index: 25; right: 28px; bottom: 30px; width: 88px; height: 88px; border-radius: 50%;
      background: rgba(255,209,63,.92); border: 4px solid rgba(58,44,40,.9); color: #3a2c28; font-size: 28px; font-weight: bold;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(0,0,0,.3); }
    #jumpBtn:active { transform: scale(.94); }
    #interactBtn { position: fixed; z-index: 26; right: 28px; bottom: 132px; padding: 12px 18px; border-radius: 18px;
      background: #66bb6a; border: 4px solid #3a2c28; color: #fff; font-size: 17px; font-weight: bold; display: none; box-shadow: 0 6px 16px rgba(0,0,0,.3); }
    #interactBtn.show { display: block; } #interactBtn:active { transform: scale(.95); }
    .zoom { position: fixed; z-index: 25; right: 16px; width: 46px; height: 46px; border-radius: 12px; background: rgba(0,0,0,.32);
      color: #fff; font-size: 26px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 0; }
    #zoomIn { top: 64px; } #zoomOut { top: 118px; }
    @media (hover: hover) and (pointer: fine) { #joy, #jumpBtn { display: none; } }

    .screen { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; background: #2a3b2f; }
    .screen.show { display: flex; }
    .card { background: #fff7ec; border: 5px solid #3a2c28; border-radius: 24px; padding: 26px; text-align: center; }
    .card h1 { font-size: 24px; margin-bottom: 6px; } .card p { color: #5a4a40; }

    #rotate { display: none; position: fixed; inset: 0; z-index: 99; background: #2a3b2f; color: #fff7ec;
      flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 12px; padding: 24px; }
    #rotate .ic { font-size: 60px; }
    @media (orientation: portrait) and (pointer: coarse) { #rotate { display: flex; } }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="coins" class="pill">🪙 0</div>
  <a class="back2d" href="./3d.html">🏠 رجوع</a>
  <div id="toast"></div>

  <button id="zoomIn" class="zoom">+</button>
  <button id="zoomOut" class="zoom">−</button>

  <div id="joy"><div id="knob"></div></div>
  <button id="interactBtn">اركب</button>
  <div id="jumpBtn">⤒</div>

  <div id="s-loading" class="screen show"><div class="card"><h1>🌍 العالم المفتوح</h1><p>جاري تحميل البلدة...</p></div></div>
  <div id="rotate"><div class="ic">📱🔄</div><h1>أدِر جهازك أفقياً</h1><p>اللعبة أفضل بالوضع الأفقي 🎮</p></div>

  <script type="module" src="/src/three/mainWorld.js"></script>
</body>
</html>
