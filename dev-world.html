<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#9fd6f4" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>جزيرة الأبطال — العالم المفتوح</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #9fd6f4;
      font-family: "Tahoma", "Segoe UI", sans-serif; -webkit-tap-highlight-color: transparent;
      touch-action: none; overscroll-behavior: none; user-select: none; color: #3a2c28; }
    #app { position: fixed; inset: 0; } #app canvas { display: block; }

    .pill { position: fixed; z-index: 20; background: rgba(0,0,0,.32); color: #fff; font-weight: bold;
      padding: 8px 14px; border-radius: 14px; text-shadow: 0 2px 4px rgba(0,0,0,.3); font-size: 18px; }
    #coins { top: 12px; left: 14px; }
    #giftBtn { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 22; display: none;
      background: #66bb6a; color: #fff; border: 3px solid #2e7d32; border-radius: 14px; padding: 8px 14px; font-weight: bold; font-size: 15px; }
    #giftBtn.show { display: block; } #giftBtn:active { transform: translateX(-50%) scale(.95); }
    .back2d { position: fixed; top: 12px; right: 14px; z-index: 22; text-decoration: none; color: #fff; font-weight: bold;
      background: rgba(0,0,0,.32); padding: 9px 13px; border-radius: 13px; font-size: 14px; }
    #toast { position: fixed; top: 54px; left: 50%; transform: translateX(-50%); z-index: 23; color: #fff; font-weight: bold;
      background: rgba(0,0,0,.5); padding: 9px 16px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none;
      max-width: 92vw; text-align: center; font-size: 15px; }
    #toast.show { opacity: 1; }

    #joy { position: fixed; z-index: 25; left: 24px; bottom: 24px; width: 128px; height: 128px; border-radius: 50%;
      background: rgba(255,255,255,.18); border: 3px solid rgba(255,255,255,.45); touch-action: none; }
    #knob { position: absolute; left: 50%; top: 50%; width: 56px; height: 56px; margin: -28px 0 0 -28px; border-radius: 50%;
      background: rgba(255,255,255,.85); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
    #jumpBtn { position: fixed; z-index: 25; right: 28px; bottom: 30px; width: 88px; height: 88px; border-radius: 50%;
      background: rgba(255,209,63,.92); border: 4px solid rgba(58,44,40,.9); color: #3a2c28; font-size: 28px; font-weight: bold;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 16px rgba(0,0,0,.3); }
    #jumpBtn:active { transform: scale(.94); }
    #interactBtn { position: fixed; z-index: 26; right: 28px; bottom: 132px; padding: 12px 18px; border-radius: 18px;
      background: #66bb6a; border: 4px solid #3a2c28; color: #fff; font-size: 17px; font-weight: bold; display: none; box-shadow: 0 6px 16px rgba(0,0,0,.3); }
    #interactBtn.show { display: block; } #interactBtn:active { transform: scale(.95); }
    .zoom { position: fixed; z-index: 25; right: 16px; width: 46px; height: 46px; border-radius: 12px; background: rgba(0,0,0,.32);
      color: #fff; font-size: 26px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 0; }
    #zoomIn { top: 60px; } #zoomOut { top: 114px; }
    @media (hover: hover) and (pointer: fine) { #joy, #jumpBtn { display: none; } }

    .screen { position: fixed; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(20,28,24,.5); }
    .screen.show { display: flex; }
    .card { background: #fff7ec; border: 5px solid #3a2c28; border-radius: 24px; padding: 22px; text-align: center; width: 460px; max-width: 94vw; max-height: 90vh; overflow: auto; box-shadow: 0 18px 50px rgba(0,0,0,.4); }
    .card h1 { font-size: 24px; margin-bottom: 4px; } .card p { color: #5a4a40; font-size: 15px; margin-bottom: 10px; }
    .shop-bal { font-weight: bold; font-size: 18px; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .item { border: 3px solid #3a2c28; border-radius: 14px; padding: 10px; background: #fff; }
    .item .t { font-weight: bold; font-size: 15px; }
    .item .sw { width: 34px; height: 34px; border-radius: 50%; margin: 6px auto; border: 2px solid #3a2c28; }
    .item button { margin-top: 6px; width: 100%; padding: 8px; border: 2px solid #3a2c28; border-radius: 10px; font-weight: bold; cursor: pointer; background: #ffd23f; font-size: 14px; }
    .item button.owned { background: #c8e6c9; } .item button.eq { background: #66bb6a; color: #fff; } .item button:disabled { opacity: .5; }
    .sec { font-weight: bold; margin: 6px 0; text-align: right; }
    .closebtn { width: 100%; padding: 12px; border: 4px solid #3a2c28; border-radius: 14px; background: #cfd8dc; font-weight: bold; font-size: 17px; cursor: pointer; }

    #s-loading { background: #2a3b2f; }
    #rotate { display: none; position: fixed; inset: 0; z-index: 99; background: #2a3b2f; color: #fff7ec;
      flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 12px; padding: 24px; }
    #rotate .ic { font-size: 60px; }
    @media (orientation: portrait) and (pointer: coarse) { #rotate { display: flex; } }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="coins" class="pill">🪙 0</div>
  <button id="giftBtn">🎁 هدية 500!</button>
  <a class="back2d" href="./3d.html">🏠 رجوع</a>
  <div id="toast"></div>

  <button id="zoomIn" class="zoom">+</button>
  <button id="zoomOut" class="zoom">−</button>
  <div id="joy"><div id="knob"></div></div>
  <button id="interactBtn">اركب</button>
  <div id="jumpBtn">⤒</div>

  <!-- shop -->
  <div id="s-shop" class="screen"><div class="card">
    <h1>🛍️ متجر الأبطال</h1>
    <div class="shop-bal" id="shop-bal">🪙 0</div>
    <div class="sec">👕 الألوان</div>
    <div class="grid" id="shop-colors"></div>
    <div class="sec">🎩 القبعات</div>
    <div class="grid" id="shop-hats"></div>
    <button class="closebtn" id="shop-close">إغلاق</button>
  </div></div>

  <div id="s-loading" class="screen show"><div class="card" style="background:#fff7ec"><h1>🌍 العالم المفتوح</h1><p>جاري تحميل البلدة...</p></div></div>
  <div id="rotate"><div class="ic">📱🔄</div><h1>أدِر جهازك أفقياً</h1><p>اللعبة أفضل بالوضع الأفقي 🎮</p></div>

  <script type="module" src="/src/three/mainWorld.js"></script>
</body>
</html>
